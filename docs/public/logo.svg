<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 圆角背景 -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- AI机器人头部 -->
  <circle cx="64" cy="44" r="22" fill="none" stroke="white" stroke-width="3" filter="url(#glow)"/>
  <!-- 眼睛 -->
  <circle cx="56" cy="40" r="3.5" fill="white"/>
  <circle cx="72" cy="40" r="3.5" fill="white"/>
  <!-- 微笑 -->
  <path d="M55 50 Q64 58 73 50" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 天线 -->
  <line x1="64" y1="22" x2="64" y2="14" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="64" cy="12" r="4" fill="url(#icon)"/>
  <!-- 书本（教师元素） -->
  <rect x="40" y="72" width="48" height="34" rx="4" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="64" y1="72" x2="64" y2="106" stroke="white" stroke-width="2"/>
  <!-- 书页线条 -->
  <line x1="46" y1="82" x2="58" y2="82" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="46" y1="88" x2="58" y2="88" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="46" y1="94" x2="56" y2="94" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="70" y1="82" x2="82" y2="82" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="88" x2="82" y2="88" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="70" y1="94" x2="80" y2="94" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- 连接AI与书的小圆点 -->
  <circle cx="64" cy="66" r="2.5" fill="url(#icon)"/>
  <circle cx="56" cy="68" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="72" cy="68" r="1.5" fill="white" opacity="0.6"/>
</svg>
